<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>

    <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.register-container {
    background-color: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
}

.register-form h1 {
    margin-bottom: 20px;
    color: #333;
    text-align: center;
}

/* Styles the <p> elements generated by form.as_p */
.register-form p {
    margin-bottom: 15px;
}

.register-form label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #555;
}

/* Selects all input, select, and textarea elements within the form */
.register-form input,
.register-form select,
.register-form textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box; /* Ensures padding doesn't affect width */
    margin-top: 5px;
    font-size: 16px;
}

.register-form input:focus {
    border-color: #007bff;
    outline: none;
}

.register-form button {
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
    margin-top: 15px;
    transition: background-color 0.3s ease;
}

.register-form button:hover {
    background-color: #0056b3;
}

.form-footer {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
}

.form-footer a {
    color: #007bff;
    text-decoration: none;
    font-weight: bold;
}

.form-footer a:hover {
    text-decoration: underline;
}


    </style>

</head>
<body>
    
    <div class="register-container">
        <h1>Admin Login</h1>
        <form id="registerForm" class="register-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Login</button>

           
        </form>
    </div>

    <script>
        const form = document.getElementById("registerForm");

        form.addEventListener("submit", async function (e) {
            e.preventDefault(); // prevent normal form submit

            const formData = new FormData(form);

            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            try {
                const response = await fetch("http://127.0.0.1:8000/api/adminLogin", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": data.csrfmiddlewaretoken
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    
                    // ✅ Redirect to home page
                    window.location.href = "adminDashboard";
                } else {
                    alert(result.error || "You are not an Admin");
                }
            } catch (err) {
                console.error(err);
                alert("You are not an Admin");
            }
        });
    </script>
</body>

</html>
