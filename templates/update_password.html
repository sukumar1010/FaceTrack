<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Password</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 35px;
    width: 360px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

.box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.box button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

.error {
    color: red;
    font-size: 14px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Update Password</h2>

    <form method="POST">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="error">{{ form.non_field_errors }}</div>
        {% endif %}

        <p>{{ form.new_password.label_tag }}     {{ form.new_password }}</p>
        <p>{{ form.confirm_password.label_tag }} {{ form.confirm_password }}</p>

        <button type="submit">Update Password</button>
    </form>
</div>

</body>
</html>
